name: Daily Research Paper Summary

on:
#  schedule:
#    # Runs at 0:30 AM UTC every day (adjust to your timezone)
#    - cron: '30 0 * * *'
  workflow_dispatch: # Allows manual trigger for testing

permissions:
  contents: write

jobs:
  fetch-and-summarize:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install requests feedparser
        
    - name: Fetch and summarize papers
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TOPICS: "quantum algorithms,quantum information"
      run: python fetch_papers.py
      
    - name: Commit and push results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add summaries/
        if ! git diff --quiet --cached; then
          git commit -m "Daily paper summaries - $(date +'%Y-%m-%d')"
          git push
        else
          echo "No changes to commit"
        fi
      continue-on-error: true
    - name: Notify completion
      if: success()
      run: |
        echo "Daily paper summaries generated successfully on $(date)"
